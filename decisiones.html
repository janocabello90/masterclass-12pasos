<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECISIONES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0F1A2E;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Particles background ── */
  .particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(212, 168, 67, 0.15);
    animation: float 8s infinite ease-in-out;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
    50% { transform: translateY(-40px) scale(1.2); opacity: 0.3; }
  }

  /* ── CATERPILLAR ── */
  .creature-container {
    position: relative;
    width: 320px;
    height: 200px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .caterpillar {
    display: flex;
    align-items: center;
    gap: 2px;
    transition: all 1s ease;
    position: absolute;
  }

  .caterpillar.hidden {
    opacity: 0;
    transform: scale(0.3);
  }

  .segment {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #4CAF50;
    position: relative;
    animation: crawl 0.6s ease-in-out infinite alternate;
  }

  .segment:nth-child(1) { animation-delay: 0s; background: #66BB6A; width: 38px; height: 36px; }
  .segment:nth-child(2) { animation-delay: 0.08s; background: #4CAF50; }
  .segment:nth-child(3) { animation-delay: 0.16s; background: #43A047; }
  .segment:nth-child(4) { animation-delay: 0.24s; background: #388E3C; }
  .segment:nth-child(5) { animation-delay: 0.32s; background: #2E7D32; }
  .segment:nth-child(6) { animation-delay: 0.4s; background: #27712B; }
  .segment:nth-child(7) { animation-delay: 0.48s; background: #1B5E20; }

  /* Eyes on head */
  .segment:nth-child(1)::before,
  .segment:nth-child(1)::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    top: 6px;
  }
  .segment:nth-child(1)::before { left: 6px; }
  .segment:nth-child(1)::after { right: 6px; }

  /* Pupils */
  .eye-pupil {
    position: absolute;
    width: 4px;
    height: 5px;
    background: #1a1a1a;
    border-radius: 50%;
    top: 9px;
    z-index: 2;
  }
  .eye-pupil.left { left: 10px; }
  .eye-pupil.right { right: 10px; }

  /* Antennae */
  .antenna {
    position: absolute;
    width: 2px;
    height: 20px;
    background: #4CAF50;
    top: -18px;
    border-radius: 2px;
  }
  .antenna.left { left: 10px; transform: rotate(-20deg); }
  .antenna.right { right: 10px; transform: rotate(20deg); }
  .antenna::after {
    content: '';
    position: absolute;
    top: -4px;
    left: -3px;
    width: 8px;
    height: 8px;
    background: #66BB6A;
    border-radius: 50%;
  }

  /* Tiny legs */
  .segment::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 6px;
    background: rgba(46, 125, 50, 0.6);
    border-radius: 0 0 2px 2px;
  }

  @keyframes crawl {
    0% { transform: translateY(0); }
    100% { transform: translateY(-4px); }
  }

  /* ── COCOON ── */
  .cocoon {
    position: absolute;
    opacity: 0;
    transform: scale(0);
    transition: all 0.8s ease;
  }

  .cocoon.visible {
    opacity: 1;
    transform: scale(1);
  }

  .cocoon.shake {
    animation: cocoonShake 0.3s ease-in-out infinite;
  }

  @keyframes cocoonShake {
    0%, 100% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(-3deg) scale(1.02); }
    75% { transform: rotate(3deg) scale(1.02); }
  }

  .cocoon.crack {
    animation: cocoonCrack 0.6s ease forwards;
  }

  @keyframes cocoonCrack {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.1); filter: brightness(1.5); }
    100% { transform: scale(0); opacity: 0; filter: brightness(2); }
  }

  /* ── BUTTERFLY ── */
  .butterfly {
    position: absolute;
    opacity: 0;
    transform: scale(0) translateY(40px);
    transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .butterfly.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  .butterfly svg {
    filter: drop-shadow(0 0 30px rgba(212, 168, 67, 0.5));
  }

  .wing-left, .wing-right {
    animation: flap 1.2s ease-in-out infinite;
    transform-origin: center right;
  }

  .wing-right {
    animation: flapRight 1.2s ease-in-out infinite;
    transform-origin: center left;
  }

  @keyframes flap {
    0%, 100% { transform: scaleX(1) rotateY(0deg); }
    50% { transform: scaleX(0.7) rotateY(30deg); }
  }

  @keyframes flapRight {
    0%, 100% { transform: scaleX(1) rotateY(0deg); }
    50% { transform: scaleX(0.7) rotateY(-30deg); }
  }

  /* ── GLOW burst ── */
  .glow-burst {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,67,0.4) 0%, transparent 70%);
    opacity: 0;
    transform: scale(0);
    pointer-events: none;
  }

  .glow-burst.visible {
    animation: burst 1.5s ease-out forwards;
  }

  @keyframes burst {
    0% { opacity: 0; transform: scale(0); }
    30% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(2); }
  }

  /* ── SPARKLES ── */
  .sparkles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0;
  }

  .sparkles.visible {
    opacity: 1;
  }

  .sparkle {
    position: absolute;
    font-size: 1.2rem;
    animation: sparkleFloat 2s ease-out forwards;
  }

  @keyframes sparkleFloat {
    0% { opacity: 1; transform: translateY(0) scale(0); }
    50% { opacity: 1; transform: translateY(-60px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
  }

  /* ── TEXT ── */
  .text-container {
    text-align: center;
    position: relative;
    z-index: 10;
  }

  .question {
    font-size: clamp(1.6rem, 4vw, 3rem);
    font-weight: 900;
    color: rgba(255,255,255,0.95);
    letter-spacing: -0.02em;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .question.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .answer {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    color: #D4A843;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-top: 16px;
    opacity: 0;
    transform: scale(0.3);
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 0 60px rgba(212, 168, 67, 0.4);
  }

  .answer.visible {
    opacity: 1;
    transform: scale(1);
  }

  .subtitle {
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-top: 32px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease 0.4s;
    letter-spacing: 0.05em;
  }

  .subtitle.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .subtitle strong {
    color: rgba(255,255,255,0.8);
    font-weight: 700;
  }

  /* ── CLICK HINT ── */
  .hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.5; }
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="vignette"></div>

<div class="particles" id="particles"></div>

<div class="stage" id="stage">

  <!-- CREATURE -->
  <div class="creature-container">
    <div class="caterpillar" id="caterpillar">
      <div class="segment">
        <div class="eye-pupil left"></div>
        <div class="eye-pupil right"></div>
        <div class="antenna left"></div>
        <div class="antenna right"></div>
      </div>
      <div class="segment"></div>
      <div class="segment"></div>
      <div class="segment"></div>
      <div class="segment"></div>
      <div class="segment"></div>
      <div class="segment"></div>
    </div>

    <div class="cocoon" id="cocoon">
      <svg width="80" height="120" viewBox="0 0 80 120">
        <ellipse cx="40" cy="60" rx="30" ry="50" fill="#5D4037" stroke="#795548" stroke-width="2"/>
        <path d="M20 30 Q40 20 60 30" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
        <path d="M18 45 Q40 35 62 45" stroke="#8D6E63" stroke-width="1" fill="none"/>
        <path d="M18 60 Q40 50 62 60" stroke="#8D6E63" stroke-width="1" fill="none"/>
        <path d="M20 75 Q40 65 60 75" stroke="#8D6E63" stroke-width="1" fill="none"/>
        <path d="M25 90 Q40 80 55 90" stroke="#8D6E63" stroke-width="1" fill="none"/>
        <line x1="40" y1="0" x2="40" y2="12" stroke="#795548" stroke-width="2"/>
      </svg>
    </div>

    <div class="glow-burst" id="glowBurst"></div>

    <div class="butterfly" id="butterfly">
      <svg width="200" height="160" viewBox="0 0 200 160">
        <!-- Left wing -->
        <g class="wing-left">
          <path d="M100 80 Q60 20 20 30 Q5 50 20 70 Q40 90 60 85 Q80 80 100 80Z"
                fill="#D4A843" opacity="0.9"/>
          <path d="M100 80 Q70 50 35 45 Q25 55 35 65 Q55 80 100 80Z"
                fill="#E8C96A" opacity="0.6"/>
          <path d="M100 80 Q75 100 40 120 Q25 110 35 95 Q55 85 100 80Z"
                fill="#D4A843" opacity="0.85"/>
          <path d="M100 80 Q80 95 55 105 Q45 100 55 92 Q75 85 100 80Z"
                fill="#E8C96A" opacity="0.5"/>
          <!-- Wing dots -->
          <circle cx="50" cy="50" r="5" fill="#1B3A5C" opacity="0.4"/>
          <circle cx="60" cy="65" r="3" fill="#1B3A5C" opacity="0.3"/>
          <circle cx="55" cy="100" r="4" fill="#1B3A5C" opacity="0.35"/>
        </g>
        <!-- Right wing -->
        <g class="wing-right">
          <path d="M100 80 Q140 20 180 30 Q195 50 180 70 Q160 90 140 85 Q120 80 100 80Z"
                fill="#D4A843" opacity="0.9"/>
          <path d="M100 80 Q130 50 165 45 Q175 55 165 65 Q145 80 100 80Z"
                fill="#E8C96A" opacity="0.6"/>
          <path d="M100 80 Q125 100 160 120 Q175 110 165 95 Q145 85 100 80Z"
                fill="#D4A843" opacity="0.85"/>
          <path d="M100 80 Q120 95 145 105 Q155 100 145 92 Q125 85 100 80Z"
                fill="#E8C96A" opacity="0.5"/>
          <!-- Wing dots -->
          <circle cx="150" cy="50" r="5" fill="#1B3A5C" opacity="0.4"/>
          <circle cx="140" cy="65" r="3" fill="#1B3A5C" opacity="0.3"/>
          <circle cx="145" cy="100" r="4" fill="#1B3A5C" opacity="0.35"/>
        </g>
        <!-- Body -->
        <ellipse cx="100" cy="80" rx="5" ry="25" fill="#1B3A5C"/>
        <circle cx="100" cy="56" r="7" fill="#1B3A5C"/>
        <!-- Antennae -->
        <path d="M97 50 Q85 30 80 25" stroke="#1B3A5C" stroke-width="1.5" fill="none"/>
        <path d="M103 50 Q115 30 120 25" stroke="#1B3A5C" stroke-width="1.5" fill="none"/>
        <circle cx="80" cy="25" r="3" fill="#D4A843"/>
        <circle cx="120" cy="25" r="3" fill="#D4A843"/>
      </svg>
    </div>

    <div class="sparkles" id="sparkles"></div>
  </div>

  <!-- TEXT -->
  <div class="text-container">
    <div class="question" id="question">EST&Aacute;S CAMBIADO, &iquest;QU&Eacute; HAS TOMADO?</div>
    <div class="answer" id="answer">DECISIONES.</div>
    <div class="subtitle" id="subtitle">Esta ser&aacute; la primera decisi&oacute;n de una cl&iacute;nica<br>que te haga <strong>vivir en paz</strong>.</div>
  </div>

</div>

<div class="hint" id="hint">Haz clic para avanzar</div>

<script>
  // ── Create particles ──
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = (6 + Math.random() * 6) + 's';
    particlesEl.appendChild(p);
  }

  // ── State machine ──
  let step = 0;

  const caterpillar = document.getElementById('caterpillar');
  const cocoon = document.getElementById('cocoon');
  const butterfly = document.getElementById('butterfly');
  const glowBurst = document.getElementById('glowBurst');
  const sparkles = document.getElementById('sparkles');
  const question = document.getElementById('question');
  const answer = document.getElementById('answer');
  const subtitle = document.getElementById('subtitle');
  const hint = document.getElementById('hint');

  function createSparkles() {
    sparkles.innerHTML = '';
    const emojis = ['✨', '⭐', '💫', '🌟', '✦'];
    for (let i = 0; i < 12; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = (30 + Math.random() * 40) + '%';
      s.style.top = (30 + Math.random() * 40) + '%';
      s.style.animationDelay = (Math.random() * 0.8) + 's';
      sparkles.appendChild(s);
    }
  }

  function advance() {
    step++;

    switch(step) {
      case 1:
        // Show question + caterpillar is already crawling
        question.classList.add('visible');
        hint.textContent = 'Clic para continuar';
        break;

      case 2:
        // Caterpillar → Cocoon
        caterpillar.classList.add('hidden');
        setTimeout(() => {
          cocoon.classList.add('visible');
        }, 600);
        break;

      case 3:
        // Cocoon shakes
        cocoon.classList.add('shake');
        break;

      case 4:
        // Cocoon cracks → Butterfly emerges → DECISIONES
        cocoon.classList.remove('shake');
        cocoon.classList.add('crack');

        setTimeout(() => {
          glowBurst.classList.add('visible');
          createSparkles();
          sparkles.classList.add('visible');
        }, 400);

        setTimeout(() => {
          butterfly.classList.add('visible');
          answer.classList.add('visible');

          // Add golden particles
          for (let i = 0; i < 10; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = 'rgba(212, 168, 67, 0.3)';
            const size = Math.random() * 8 + 3;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 3 + 's';
            particlesEl.appendChild(p);
          }
        }, 800);

        setTimeout(() => {
          subtitle.classList.add('visible');
          hint.style.opacity = '0';
        }, 1600);

        break;

      default:
        // Reset
        step = 0;
        caterpillar.classList.remove('hidden');
        cocoon.classList.remove('visible', 'shake', 'crack');
        butterfly.classList.remove('visible');
        glowBurst.classList.remove('visible');
        sparkles.classList.remove('visible');
        question.classList.remove('visible');
        answer.classList.remove('visible');
        subtitle.classList.remove('visible');
        hint.style.opacity = '';
        hint.textContent = 'Haz clic para avanzar';
        break;
    }
  }

  document.body.addEventListener('click', advance);

  // Also advance with spacebar or arrow keys
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowRight' || e.code === 'Enter') {
      e.preventDefault();
      advance();
    }
  });
</script>

</body>
</html>
